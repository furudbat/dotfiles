workspace = 2,monitor:HDMI-A-1
workspace = 3,monitor:HDMI-A-1
workspace = 4,monitor:HDMI-A-1
workspace = 5,monitor:HDMI-A-1

workspace = 6,monitor:DP-1,default:true
workspace = 7,monitor:DP-1
workspace = 8,monitor:DP-1
workspace = 9,monitor:DP-1
workspace = 10,monitor:DP-1

workspace = 11,monitor:DP-2,default:true
workspace = 12,monitor:DP-2
workspace = 13,monitor:DP-2
workspace = 14,monitor:DP-2
workspace = 15,monitor:DP-2

workspace = 16,monitor:DP-3,default:true
workspace = 17,monitor:DP-3
workspace = 18,monitor:DP-3
workspace = 19,monitor:DP-3
workspace = 20,monitor:DP-3

